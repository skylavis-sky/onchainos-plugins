schema_version: 1
name: mayan
version: "0.1.0"
description: "Mayan cross-chain swap — Swift/MCTP routes between Solana, Ethereum, Arbitrum, Base, Optimism, Polygon, BSC, and Avalanche"
author:
  name: skylavis-sky
  github: skylavis-sky
license: Apache-2.0
category: defi-protocol
tags:
  - bridge
  - cross-chain
  - solana
  - ethereum
  - arbitrum
  - base

components:
  skill:
    dir: skills/mayan
  binary:
    repo: skylavis-sky/onchainos-plugins
    asset_pattern: "mayan-{version}-{target}.tar.gz"

build:
  lang: rust
  binary_name: mayan
  source_repo: skylavis-sky/onchainos-plugins
  source_commit: "6882d08d56eb3be8f68700f92def6f0bfc997fe8"
  source_dir: mayan

api_calls:
  - "https://price-api.mayan.finance"
  - "https://explorer-api.mayan.finance"
  - "https://plugin-store-dun.vercel.app/install"
  - "https://www.okx.com/priapi/v1/wallet/plugins/download/report"
