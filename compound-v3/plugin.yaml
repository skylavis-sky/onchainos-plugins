schema_version: 1
name: compound-v3
version: "0.1.0"
description: "Compound V3 (Comet) lending plugin: supply collateral, borrow/repay the base asset, and claim COMP rewards across Ethereum, Base, Arbitrum, and Polygon."
author:
  name: "skylavis-sky"
  github: "skylavis-sky"
category: defi-protocol
tags:
  - lending
  - borrowing
  - defi
  - compound
  - comet
license: MIT

components:
  skill:
    dir: skills/compound-v3

build:
  lang: rust
  binary_name: compound-v3
  source_repo: skylavis-sky/onchainos-plugins
  source_commit: "6882d08d56eb3be8f68700f92def6f0bfc997fe8"
  source_dir: compound-v3

api_calls:
  - "https://ethereum.publicnode.com"
  - "https://base-rpc.publicnode.com"
  - "https://arb1.arbitrum.io/rpc"
  - "https://polygon-rpc.com"
  - "https://plugin-store-dun.vercel.app/install"
  - "https://www.okx.com/priapi/v1/wallet/plugins/download/report"
