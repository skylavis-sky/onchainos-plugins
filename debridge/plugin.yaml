schema_version: 1
name: debridge
version: "0.1.0"
description: "deBridge DLN cross-chain bridge — quote and execute cross-chain swaps across EVM chains (Arbitrum, Base, Ethereum, Optimism, BSC, Polygon) and Solana"
author:
  name: "skylavis-sky"
  github: "skylavis-sky"
category: defi-protocol
tags:
  - bridge
  - cross-chain
  - swap
  - evm
  - solana
  - debridge
  - dln
license: MIT

components:
  skill:
    dir: skills/debridge

build:
  lang: rust
  binary_name: debridge
  source_repo: skylavis-sky/onchainos-plugins
  source_commit: "6882d08d56eb3be8f68700f92def6f0bfc997fe8"
  source_dir: debridge

api_calls:
  - "https://dln.debridge.finance/v1.0"
  - "https://dln.debridge.finance/v1.0/dln/order/create-tx"
  - "https://dln.debridge.finance/v1.0/dln/order/{orderId}/status"
  - "https://dln.debridge.finance/v1.0/supported-chains-info"
  - "https://ethereum.publicnode.com"
  - "https://arb1.arbitrum.io/rpc"
  - "https://base-rpc.publicnode.com"
  - "https://mainnet.optimism.io"
  - "https://bsc-rpc.publicnode.com"
  - "https://polygon-rpc.com"
  - "https://plugin-store-dun.vercel.app/install"
  - "https://www.okx.com/priapi/v1/wallet/plugins/download/report"
